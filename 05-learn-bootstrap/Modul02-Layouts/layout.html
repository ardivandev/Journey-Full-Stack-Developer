<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layouts | Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      section {
        margin: 1rem 0;
      }

      .column-custom {
        padding: 20px;
        background-color: #91baef;
        border: 1px solid blue;
      }
    </style>
  </head>
  <body>
    <!-- Latihan 1 -->
    <section class="container text-center">
      <div class="row">
        <div class="col column-custom">Column</div>
        <div class="col column-custom">Column</div>
        <div class="col column-custom">Column</div>
      </div>
    </section>

    <!-- Latihan 2 -->
    <section class="container text-center">
      <div class="row">
        <div class="col col-md-6 column-custom">Column</div>
        <div class="col column-custom">Column</div>
        <div class="col column-custom">Column</div>
      </div>
    </section>

    <!-- Latihan 3 -->
    <section class="container text-center">
      <div class="row row-cols-2">
        <div class="col column-custom">Column</div>
        <div class="col column-custom">Column</div>
        <div class="col column-custom">Column</div>
        <div class="col column-custom">Column</div>
      </div>
    </section>

    <!-- Latihan 4 -->
    <section class="container px-4 text-center">
      <div class="row gx-5">
        <div class="col">
          <div class="p-3 border border-primary">Custom column padding</div>
        </div>
        <div class="col">
          <div class="p-3 border border-primary">Custom column padding</div>
        </div>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
